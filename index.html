<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 3rem 2rem;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 120, 160, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.8rem;
            color: #b34167;
            margin-bottom: 1.5rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        .heart-message {
            font-size: 1.5rem;
            color: #8b3a5a;
            margin-bottom: 2rem;
            line-height: 1.6;
            font-style: italic;
            background: rgba(255, 255, 255, 0.3);
            padding: 1.5rem;
            border-radius: 30px;
            box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.8);
        }

        .heart-message::before {
            content: "❤️ ";
            font-size: 2rem;
        }

        .heart-message::after {
            content: " ❤️";
            font-size: 2rem;
        }

        /* Timer styles */
        .timer-container {
            background: rgba(255, 230, 240, 0.6);
            border-radius: 50px;
            padding: 1.5rem;
            margin: 2rem 0;
            border: 2px dashed #ffa5b9;
        }

        .timer-label {
            font-size: 1.3rem;
            color: #b34167;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .timer-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #b34167;
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(255, 120, 160, 0.3);
            font-family: 'Courier New', monospace;
        }

        .timer-unit {
            font-size: 1rem;
            color: #8b3a5a;
            margin: 0 0.2rem;
        }

        .cute-btn {
            background: #ff8aa1;
            border: none;
            color: white;
            font-size: 2rem;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 0 #b34167, 0 8px 20px rgba(255, 80, 120, 0.4);
            transition: all 0.1s ease;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px solid white;
            outline: none;
            margin-top: 1rem;
        }

        .cute-btn:hover {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #b34167, 0 8px 20px rgba(255, 80, 120, 0.4);
            background: #ff7595;
        }

        .cute-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #b34167, 0 8px 20px rgba(255, 80, 120, 0.4);
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.6;
            animation: float 6s infinite;
            user-select: none;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        @media (max-width: 500px) {
            h1 { font-size: 2rem; }
            .heart-message { font-size: 1.2rem; }
            .timer-display { font-size: 1.8rem; }
            .cute-btn { font-size: 1.5rem; padding: 0.8rem 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="floating-heart" style="top: 10%; left: 5%;">🌸</div>
    <div class="floating-heart" style="top: 20%; right: 8%; animation-delay: 2s;">💖</div>
    <div class="floating-heart" style="bottom: 15%; left: 10%; animation-delay: 3s;">✨</div>
    <div class="floating-heart" style="bottom: 25%; right: 15%; animation-delay: 1s;">🌼</div>

    <div class="container">
        <h1>Hello [Her Name] 💌</h1>
        <div class="heart-message">
            I've made something special just for you...<br>
            Click the button below to begin.
        </div>

        <!-- Count-up timer -->
        <div class="timer-container">
            <div class="timer-label">⏰ We've been talking for...</div>
            <div class="timer-display" id="timer">0 days 00:00:00</div>
            <div style="font-size:0.9rem; color:#8b3a5a; margin-top:0.5rem;">
                (since March 2, 2026 · 5:51 PM)
            </div>
        </div>

        <button class="cute-btn" id="nextBtn">Open Me 💖</button>
    </div>

    <script>
        // Set the start date and time (year, month, day, hour, minute, second)
        // Month is 0-indexed in JavaScript: 2 = March
        const startDate = new Date(2026, 2, 2, 17, 51, 0); // March 2, 2026, 17:51:00

        function updateTimer() {
            const now = new Date();
            const diffMs = now - startDate; // difference in milliseconds

            if (diffMs < 0) {
                // If the start date is in the future, show zeros
                document.getElementById('timer').innerText = '0 days 00:00:00';
                return;
            }

            // Calculate days, hours, minutes, seconds
            const totalSeconds = Math.floor(diffMs / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            // Format with leading zeros
            const formattedHours = hours.toString().padStart(2, '0');
            const formattedMinutes = minutes.toString().padStart(2, '0');
            const formattedSeconds = seconds.toString().padStart(2, '0');

            document.getElementById('timer').innerText = `${days} days ${formattedHours}:${formattedMinutes}:${formattedSeconds}`;
        }

        // Update immediately and then every second
        updateTimer();
        setInterval(updateTimer, 1000);

        // Button click to go to next page
        document.getElementById('nextBtn').addEventListener('click', function() {
            window.location.href = 'page2.html';
        });
    </script>
</body>
</html>
