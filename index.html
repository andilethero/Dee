<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 3rem 2rem;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 120, 160, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.8rem;
            color: #b34167;
            margin-bottom: 1.5rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        .heart-message {
            font-size: 1.5rem;
            color: #8b3a5a;
            margin-bottom: 2rem;
            line-height: 1.6;
            font-style: italic;
            background: rgba(255, 255, 255, 0.3);
            padding: 1.5rem;
            border-radius: 30px;
            box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.8);
        }

        .heart-message::before {
            content: "❤️ ";
            font-size: 2rem;
        }

        .heart-message::after {
            content: " ❤️";
            font-size: 2rem;
        }

        .cute-btn {
            background: #ff8aa1;
            border: none;
            color: white;
            font-size: 2rem;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 0 #b34167, 0 8px 20px rgba(255, 80, 120, 0.4);
            transition: all 0.1s ease;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px solid white;
            outline: none;
            margin-top: 1rem;
        }

        .cute-btn:hover {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #b34167, 0 8px 20px rgba(255, 80, 120, 0.4);
            background: #ff7595;
        }

        .cute-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #b34167, 0 8px 20px rgba(255, 80, 120, 0.4);
        }

        /* Small floating hearts (optional decoration) */
        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.6;
            animation: float 6s infinite;
            user-select: none;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* Responsive for small screens */
        @media (max-width: 500px) {
            h1 { font-size: 2rem; }
            .heart-message { font-size: 1.2rem; }
            .cute-btn { font-size: 1.5rem; padding: 0.8rem 1.8rem; }
        }
    </style>
</head>
<body>
    <!-- Optional floating hearts decoration -->
    <div class="floating-heart" style="top: 10%; left: 5%;">🌸</div>
    <div class="floating-heart" style="top: 20%; right: 8%; animation-delay: 2s;">💖</div>
    <div class="floating-heart" style="bottom: 15%; left: 10%; animation-delay: 3s;">✨</div>
    <div class="floating-heart" style="bottom: 25%; right: 15%; animation-delay: 1s;">🌼</div>

    <div class="container">
        <h1>Hello Dee💌</h1>
        <div class="heart-message">
            I've made something special just for you...<br>
            Click the button below to begin.
        </div>
        <button class="cute-btn" id="nextBtn">Open Me 💖</button>
    </div>

    <script>
        document.getElementById('nextBtn').addEventListener('click', function() {
            // Replace 'page2.html' with the actual file name of your next page
            window.location.href = 'page2.html';
            // If you want to test without creating page2 yet, use:
            // alert("Next page will go here! (Now create page2.html)");
        });
    </script>
</body>
</html>
