<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤫 A little secret...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
            color: #b34167;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 40px rgba(255, 120, 160, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }
        .secret-message {
            font-size: 1.4rem;
            line-height: 1.8;
            margin: 2rem 0;
            background: rgba(255, 255, 255, 0.3);
            padding: 2rem;
            border-radius: 30px;
        }
        .flower {
            font-size: 3rem;
            animation: sway 3s infinite;
            display: inline-block;
        }
        @keyframes sway {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
            100% { transform: rotate(0deg); }
        }
        .back-btn {
            background: #ff8aa1;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 2rem;
            box-shadow: 0 5px 0 #b34167;
            transition: 0.1s;
        }
        .back-btn:hover {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b34167;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flower">🌸</div>
        <h1>🤫 You found my secret!</h1>
        <div class="secret-message">
            <p>I wanted to hide a little extra "I love you" where you'd least expect it.</p>
            <p>Every day with you is a new adventure, and I can't wait to see what our story writes next.</p>
            <p>💕 You're my favorite thought, my sweetest dream, and my forever person. 💕</p>
        </div>
        <div class="flower">🌼</div>
        <br>
        <button class="back-btn" onclick="window.location.href='future.html';">Back to our future</button>
    </div>
</body>
</html>
